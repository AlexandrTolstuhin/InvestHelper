<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="InvestHelper — портфели MOEX с целевой ребалансировкой" />
		<title>InvestHelper</title>
		<script>
			(function () {
				try {
					var t = localStorage.getItem('investhelper-theme');
					if (t !== 'light' && t !== 'dark') {
						t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
					}
					document.documentElement.setAttribute('data-mode', t);
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
